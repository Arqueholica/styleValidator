server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/docstyler
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

docstyler:
  upload-dir: ./uploads
  profile-path: classpath:data/styles.xml
